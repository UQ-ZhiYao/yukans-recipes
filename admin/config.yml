backend:
  name: github
  repo: uq-zhiyao/yukans-recipes
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

# This is the Admin (edit-only) pathway: it only ever shows editing forms,
# never the rendered site. The public Jekyll build is the view-only pathway.
publish_mode: simple

media_folder: "images"
public_folder: "/images"

collections:
  - name: "recipes"
    label: "Recipes"
    label_singular: "Recipe"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - { label: "Hero Image", name: "image", widget: "image", required: false }
      - { label: "Hero Image Alt Text", name: "image_alt", widget: "string", required: false }
      - { label: "Instagram Post Link", name: "instagram_url", widget: "string", required: false }
      - { label: "Recipe", name: "body", widget: "markdown" }
