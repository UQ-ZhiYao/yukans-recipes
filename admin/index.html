<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Yukan's recipes</title>
  <link rel="stylesheet" href="../assets/css/style.css?v=2">

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#175cd3">
  <link rel="icon" href="../assets/icons/icon-admin-192.png">
  <link rel="apple-touch-icon" href="../assets/icons/icon-admin-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Recipes Admin">
</head>
<body class="admin-body">
  <header class="admin-header">
    <div class="wrapper">
      <div class="admin-header-left">
        <a href="../index.html">&larr; Yukan's recipes</a>
        <span class="admin-badge">Admin · edit only</span>
      </div>
      <div class="admin-header-right">
        <button id="install-btn" class="btn btn-secondary btn-sm" type="button" hidden>Install app</button>
        <button id="logout-btn" class="btn btn-secondary btn-sm" type="button" hidden>Log out</button>
      </div>
    </div>
  </header>

  <main>
    <div class="wrapper">

      <section id="login-panel" class="admin-panel">
        <h2>Log in</h2>
        <p>
          Paste a GitHub <strong>fine-grained personal access token</strong> scoped to the
          <code>uq-zhiyao/yukans-recipes</code> repo only, with <strong>Contents: read and write</strong>
          permission. It's stored in this browser's local storage and is never committed to the repo.
        </p>
        <div class="field">
          <label for="token-input">Personal access token</label>
          <input type="password" id="token-input" autocomplete="off" placeholder="github_pat_...">
        </div>
        <div class="btn-row">
          <button id="login-btn" class="btn btn-primary" type="button">Log in</button>
        </div>
        <p id="login-status" class="status-line"></p>
      </section>

      <section id="editor-panel" class="admin-panel" hidden>
        <div class="recipe-picker">
          <label for="recipe-select">Recipe:</label>
          <select id="recipe-select"></select>
        </div>

        <form id="recipe-form">
          <div class="field">
            <label for="title-input">Title</label>
            <input type="text" id="title-input" required>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="date-input">Publish date</label>
              <input type="date" id="date-input" required>
            </div>
            <div class="field">
              <label for="instagram-input">Instagram link</label>
              <input type="url" id="instagram-input" placeholder="https://www.instagram.com/...">
            </div>
          </div>

          <div class="field">
            <label for="image-input">Hero image
              <span class="hint">Uploading a file adds or replaces the image for this recipe.</span>
            </label>
            <div id="current-image"></div>
            <div class="btn-row image-btn-row">
              <input type="file" id="image-input" accept="image/*">
              <button id="remove-image-btn" class="btn btn-danger btn-sm" type="button" hidden>Remove image</button>
            </div>
          </div>

          <div class="field">
            <label for="image-alt-input">Hero image alt text</label>
            <input type="text" id="image-alt-input" placeholder="Describe the photo">
          </div>

          <div class="field">
            <label for="body-input">Recipe (Markdown)</label>
            <textarea id="body-input" placeholder="Ingredients, steps, notes..."></textarea>
          </div>

          <div class="btn-row">
            <button id="save-btn" class="btn btn-primary" type="submit">Save recipe</button>
            <button id="delete-btn" class="btn btn-danger" type="button" hidden>Delete recipe</button>
          </div>
          <p id="save-status" class="status-line"></p>
        </form>
      </section>

    </div>
  </main>

  <script src="../assets/js/github-api.js?v=2"></script>
  <script src="../assets/js/admin.js?v=2"></script>
</body>
</html>
