---
layout: default
---
<article class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
    <p class="post-meta">
      {%- assign date_format = site.minima.date_format | default: "%b %-d, %Y" -%}
      {{ page.date | date: date_format }}
    </p>
  </header>

  {%- if page.image -%}
  <p class="recipe-hero">
    <img src="{{ page.image | relative_url }}" alt="{{ page.image_alt | default: page.title | escape }}">
  </p>
  {%- endif -%}

  {%- if page.instagram_url -%}
  <p class="recipe-instagram-link">
    <a href="{{ page.instagram_url }}" target="_blank" rel="noopener">View this post on Instagram &rarr;</a>
  </p>
  {%- endif -%}

  <div class="post-content">
    {{ content }}
  </div>

</article>
